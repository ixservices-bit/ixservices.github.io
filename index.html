<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0b0f14">
  <title>ICQA Resources Admin Panel</title>
  <link rel="stylesheet" href="style.css?v=20260519-admin6">
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">ICQA Resources</p>
        <h1>Admin Panel</h1>
      </div>
      <button id="refreshBtn" class="command" type="button">Refresh</button>
    </header>

    <section class="controls">
      <div class="segmented" id="rangeTabs" aria-label="Date range">
        <button data-range="7" class="active" type="button">7d</button>
        <button data-range="30" type="button">30d</button>
        <button data-range="60" type="button">60d</button>
        <button data-range="90" type="button">90d</button>
        <button data-range="all" type="button">All</button>
      </div>
      <select id="buildFilter" aria-label="Build filter">
        <option>All Builds</option>
        <option>ICQA</option>
        <option>RDC</option>
      </select>
      <input id="searchBox" type="search" placeholder="Search users, machines, forms">
    </section>

    <nav class="tabs" id="viewTabs" aria-label="Admin views">
      <button data-view="overview" class="active" type="button">Overview</button>
      <button data-view="analytics" type="button">Analytics</button>
      <button data-view="users" type="button">Users</button>
      <button data-view="forms" type="button">Forms</button>
      <button data-view="machines" type="button">Machines</button>
      <button data-view="groups" type="button">Groups</button>
      <button data-view="quicklinks" type="button">Quick Links</button>
      <button data-view="feedback" type="button">Feedback</button>
      <button data-view="versions" type="button">Versions</button>
    </nav>

    <section id="statusLine" class="status-line">Loading data...</section>
    <section id="content" class="content" aria-live="polite"></section>
  </main>

  <script src="config.js?v=20260519-admin6"></script>
  <script src="app.js?v=20260519-admin6"></script>
</body>
</html>
